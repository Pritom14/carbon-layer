name: settlement-delay
description: >
  Simulates settlement delays where T+1 settlement becomes T+3.
  Creates orders, captures payments, then triggers refunds on a subset
  to test whether your reconciliation logic handles delayed settlements
  and refund-on-unsettled-payment edge cases correctly.

category: settlement

parameters:
  baseline_orders:
    default: 200
    description: Number of orders to create
  refund_rate:
    default: 0.1
    description: Fraction of captured payments that receive refunds during delay
  avg_order_value_paise:
    default: 150000
    description: Average order value in paise (1500 INR)

phases:
  - name: baseline
    description: Create orders, payments, and capture
    actions:
      - create_orders:
          count: 200
          amount_paise: 150000
      - create_payments:
          for_each: orders
          success_rate: 1.0
      - capture_payments:
          for_each: successful_payments

  - name: settlement_disruption
    description: Refunds during settlement delay window
    depends_on: baseline
    actions:
      - create_refunds:
          count: 20
          "on": captured_payments
          sample: random

validations:
  - check: orders_count
    description: Baseline orders created
    expected: ">= 200"
    severity: high
  - check: payments_captured_count
    description: All payments should be captured
    expected: ">= 200"
    severity: high
  - check: refunds_count
    description: Refunds during settlement delay
    expected: ">= 20"
    severity: high

findings:
  - condition: "refunds_count < 10"
    message: "Very few refunds created during settlement delay window."
    severity: medium
  - condition: "payments_captured_count < 100"
    message: "Low capture count; baseline may not be representative."
    severity: medium
