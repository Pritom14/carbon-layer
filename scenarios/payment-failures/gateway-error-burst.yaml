# Intermittent gateway errors; ~50% success rate.

name: gateway-error-burst
description: >
  Simulates intermittent gateway failures (e.g. timeouts, 5xx). ~50% of payments succeed.
  Same flow as payment-decline-spike with lower success rate.

category: payment_failures

parameters:
  baseline_orders:
    default: 1000
    description: Number of orders to create
  success_rate:
    default: 0.5
    description: Fraction of payments that succeed (0.5 = 50% success)
  avg_order_value_paise:
    default: 250000
    description: Average order value in paise

phases:
  - name: baseline
    description: Create orders, payments (50% success), capture successful only
    actions:
      - create_orders:
          count: 1000
          amount_paise: 250000
      - create_payments:
          for_each: orders
          success_rate: 0.5
      - capture_payments:
          for_each: successful_payments

validations:
  - check: orders_count
    description: Orders created
    expected: ">= 1000"
    severity: high
  - check: payment_success_rate
    description: Success rate around 0.5
    expected: ">= 0.4"
    severity: high

findings:
  - condition: "payment_success_rate < 0.3"
    message: "Success rate very low; gateway may be failing more than configured."
    severity: medium
