# High volume: 5k orders, tests throughput and webhook load.

name: flash-sale
description: >
  Simulates a flash sale: high order and payment volume (5k orders).
  Tests throughput and webhook backlog handling.

category: load

parameters:
  baseline_orders:
    default: 5000
    description: Number of orders during flash sale
  avg_order_value_paise:
    default: 250000
    description: Average order value in paise

phases:
  - name: flash
    description: Create high volume of orders and capture payments
    actions:
      - create_orders:
          count: 5000
          amount_paise: 250000
      - create_payments:
          for_each: orders
          success_rate: 1.0
      - capture_payments:
          for_each: successful_payments

validations:
  - check: orders_count
    description: Flash sale volume
    expected: ">= 5000"
    severity: high
  - check: payments_captured_count
    description: All payments captured
    expected: ">= 5000"
    severity: high

findings:
  - condition: "orders_count < 1000"
    message: "Order count below flash-sale scale; run may have been truncated."
    severity: medium
