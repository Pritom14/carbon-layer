# Edge case: large amount (10L paise = 10,000 INR).

name: max-amount
description: >
  Same flow with large amount (10,00,000 paise = 10,000 INR). Edge case for limits and reconciliation.

category: edge_case

parameters:
  amount_paise:
    default: 1000000
    description: Large order amount in paise (10L = 10000 INR)

phases:
  - name: baseline
    description: Create one order at large amount, pay and capture
    actions:
      - create_orders:
          count: 1
          amount_paise: 1000000
      - create_payments:
          for_each: orders
          success_rate: 1.0
      - capture_payments:
          for_each: successful_payments

validations:
  - check: orders_count
    description: One order created
    expected: ">= 1"
    severity: high
  - check: payments_captured_count
    description: Payment captured at max amount
    expected: ">= 1"
    severity: high

findings: []
